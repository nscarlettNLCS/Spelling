<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Detective: Case Files & Rewards</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f4f8; --dark: #2d3436; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 650px; width: 95%; margin-bottom: 20px; vertical-align: top; }
        
        /* MENU & REWARD STYLES */
        .category-btn, .reward-btn { background: white; border: 2px solid var(--primary); color: var(--primary); padding: 15px; margin: 10px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 85%; font-size: 1.1em; transition: 0.2s; }
        .category-btn:hover { background: var(--primary); color: white; }
        .reward-btn { border-color: var(--gold); color: #d35400; background: #fff9db; display: flex; align-items: center; justify-content: center; margin: 10px auto; }
        .reward-btn:hover { background: var(--gold); color: white; }

        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; font-size: 0.9em; }
        .round-indicator { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        .sentence { font-size: 1.3em; margin: 20px; font-style: italic; color: #444; min-height: 3em; line-height: 1.4; }
        
        /* PHONETIC INTERACTIVE */
        #phonetic-reveal-area { display: none; margin: 20px 0; border-top: 1px solid #eee; padding-top: 15px; }
        .syllable-btn { background: #dfe6e9; border: 2px solid #b2bec3; padding: 10px 20px; margin: 5px; border-radius: 10px; cursor: pointer; font-size: 1.2em; font-weight: bold; color: transparent; user-select: none; }
        .syllable-btn.revealed { color: var(--dark); background: white; border-color: var(--primary); }

        #grammar-box { display: none; background: #fff9db; border-left: 5px solid #f1c40f; padding: 15px; margin: 15px 0; border-radius: 5px; text-align: left; font-size: 0.95em; line-height: 1.4; }
        .scrambled { font-size: 2.2em; font-weight: bold; letter-spacing: 6px; margin: 15px; text-transform: uppercase; min-height: 1.2em; color: var(--primary); }
        
        /* MOBILE SECURITY INPUT (NO AUTOCORRECT) */
        input { font-size: 1.4em; padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 85%; outline: none; margin-bottom: 10px; text-align: center; }
        
        button.action-btn { font-size: 1.1em; padding: 12px 25px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-check { background: var(--success); color: white; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; }
        
        #game-ui, #report-screen, #reward-screen { display: none; }
        .prize-icon { font-size: 2em; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container" id="menu-screen">
    <h1>Detective Case Files 🕵️‍♀️</h1>
    <p>Select a category to begin your training:</p>
    <div id="category-list">Searching for files...</div>
</div>

<div class="container" id="game-ui">
    <div class="round-indicator" id="round-tag">Round 1: Investigation</div>
    <div class="stats-bar">
        <span>Word: <span id="current-count">1</span>/10</span>
        <span>Mastery Points: <span id="score-display">0</span></span>
    </div>
    
    <div id="sentence-display" class="sentence"></div>
    <div id="scrambled-word" class="scrambled"></div>
    
    <input type="text" 
           id="user-input" 
           placeholder="Type word here..." 
           autocorrect="off" 
           autocapitalize="none" 
           spellcheck="false" 
           autocomplete="off">
    
    <div id="action-buttons">
        <button class="action-btn btn-check" id="check-btn" onclick="checkWord()">Check Spelling</button>
        <button class="action-btn btn-next" id="next-btn" onclick="nextWord()">Next Word →</button>
    </div>

    <div id="phonetic-reveal-area">
        <p><small>Tap blocks for phonetic clues:</small></p>
        <div id="syllable-container"></div>
    </div>
    
    <div id="grammar-box"></div>
    <div id="message" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="container" id="report-screen">
    <h1 id="report-title">Mission Update</h1>
    <div id="session-summary" style="font-size:1.4em; margin: 20px 0; font-weight: bold;"></div>
    <div id="performance-feedback" style="margin-bottom: 20px; color: #666;"></div>
    <button class="action-btn btn-check" id="round-action-btn" style="width:100%" onclick="handleRoundTransition()"></button>
</div>

<div class="container" id="reward-screen">
    <h1>Promotion Earned! 🌟</h1>
    <p>You scored 90% or higher in Master Mode! Pick your reward to notify Dad:</p>
    
    <button class="reward-btn" onclick="sendRewardEmail('15 Minutes Screen Time')">
        <span class="prize-icon">📱</span> 15 Minutes Screen Time
    </button>
    
    <button class="reward-btn" onclick="sendRewardEmail('Ice-Cream')">
        <span class="prize-icon">🍦</span> Ice-Cream
    </button>
    
    <button class="reward-btn" onclick="sendRewardEmail('2000 Won')">
        <span class="prize-icon">💰</span> 2000 Won
    </button>
</div>

<script>
    // --- PARENT CONFIGURATION ---
    const PARENT_EMAILS = "nscarlett@nlcsjeju.kr,okjuscarlett@gmail.com"; 
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv';
    // ----------------------------

    let masterList = [];
    let sessionWords = [];
    let currentIndex = 0;
    let currentRound = 1;
    let perfectCount = 0;

    async function loadWords() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            
            masterList = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    word: cols[0]?.replace(/^"|"$/g, '').trim().toUpperCase(), 
                    sentence: cols[1]?.replace(/^"|"$/g, '').trim(),
                    phonetic: cols[2]?.replace(/^"|"$/g, '').trim(),
                    grammar: cols[3]?.replace(/^"|"$/g, '').trim(),
                    category: cols[4]?.replace(/^"|"$/g, '').trim() || "General"
                };
            }).filter(item => item.word);
            
            buildMenu();
        } catch (e) {
            document.getElementById('category-list').innerText = "Error syncing with Google Sheets. Please check your link!";
        }
    }

    function buildMenu() {
        const categories = [...new Set(masterList.map(item => item.category))];
        const listDiv = document.getElementById("category-list");
        listDiv.innerHTML = "";
        
        categories.forEach(cat => {
            let btn = document.createElement("button");
            btn.className = "category-btn";
            btn.innerText = cat;
            btn.onclick = () => startSession(cat);
            listDiv.appendChild(btn);
        });
    }

    function startSession(cat) {
        currentRound = 1;
        perfectCount = 0;
        const filtered = masterList.filter(item => item.category === cat);
        sessionWords = filtered.sort(() => Math.random() - 0.5).slice(0, 10);
        
        document.getElementById("menu-screen").style.display = "none";
        setupRound();
    }

    function setupRound() {
        currentIndex = 0;
        document.getElementById("round-tag").innerText = currentRound === 1 ? "Round 1: Investigation" : "Round 2: Master Detective";
        document.getElementById("report-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        let obj = sessionWords[currentIndex];
        
        document.getElementById("score-display").innerText = perfectCount;
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("sentence-display").innerText = obj.sentence.replace(new RegExp(obj.word, 'gi'), "_______");
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("message").innerText = "";
        document.getElementById("grammar-box").style.display = "none";
        document.getElementById("phonetic-reveal-area").style.display = "none";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";

        document.getElementById("scrambled-word").innerText = (currentRound === 1) ? 
            obj.word.split('').sort(() => Math.random() - 0.5).join(' ') : "";
        
        document.getElementById("user-input").focus();
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let target = sessionWords[currentIndex].word;

        if (guess === target) {
            if (currentRound === 2) perfectCount++; 
            handleSuccess();
        } else {
            document.getElementById("message").style.color = "var(--error)";
            document.getElementById("message").innerText = "❌ Not quite! Check the pattern and try again.";
        }
    }

    function handleSuccess() {
        let obj = sessionWords[currentIndex];
        document.getElementById("user-input").disabled = true;
        document.getElementById("message").style.color = "var(--success)";
        document.getElementById("message").innerText = "✔ Correct!";
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";

        if (obj.grammar) {
            const gBox = document.getElementById("grammar-box");
            gBox.innerText = obj.grammar;
            gBox.style.display = "block";
        }

        const syllCont = document.getElementById("syllable-container");
        syllCont.innerHTML = "";
        let parts = (obj.phonetic || obj.word).split(/[•·\-\s/]+/).map(p => p.trim());
        parts.forEach(part => {
            let btn = document.createElement("button");
            btn.className = "syllable-btn";
            btn.innerText = part.toUpperCase();
            btn.onclick = function() { this.classList.add("revealed"); };
            syllCont.appendChild(btn);
        });
        document.getElementById("phonetic-reveal-area").style.display = "block";
    }

    function nextWord() {
        currentIndex++;
        showWord();
    }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        const scorePct = (perfectCount / sessionWords.length) * 100;
        
        if (currentRound === 1) {
            document.getElementById("report-title").innerText = "Case Investigation Complete!";
            document.getElementById("session-summary").innerText = "You've studied the patterns.";
            document.getElementById("performance-feedback").innerText = "Now prove your mastery in Round 2 with no hints!";
            document.getElementById("round-action-btn").innerText = "Start Master Round";
        } else {
            document.getElementById("report-title").innerText = "Mastery Report";
            document.getElementById("session-summary").innerText = `Final Score: ${scorePct}%`;
            
            if (scorePct >= 90) {
                document.getElementById("performance-feedback").innerText = "Incredible! You are a Master Detective.";
                document.getElementById("round-action-btn").innerText = "Claim My Reward! 🎁";
            } else {
                document.getElementById("performance-feedback").innerText = "So close! Try again to get 90% and earn a reward.";
                document.getElementById("round-action-btn").innerText = "Back to Menu";
            }
        }
    }

    function handleRoundTransition() {
        const scorePct = (perfectCount / sessionWords.length) * 100;
        if (currentRound === 1) {
            currentRound = 2;
            perfectCount = 0;
            setupRound();
        } else if (scorePct >= 90) {
            document.getElementById("report-screen").style.display = "none";
            document.getElementById("reward-screen").style.display = "inline-block";
        } else {
            location.reload();
        }
    }

    function sendRewardEmail(reward) {
        const subject = encodeURIComponent("Spelling Reward Earned! 🏆");
        const body = encodeURIComponent(`Hi Dad! I mastered my spelling list with a high score and I have chosen my reward: ${reward}. Can't wait!`);
        window.location.href = `mailto:${PARENT_EMAILS}?subject=${subject}&body=${body}`;
        
        alert("Selection recorded! Please click 'Send' in your email app to notify Dad.");
        location.reload();
    }

    document.getElementById("user-input").addEventListener("keyup", (e) => {
        if(e.key === "Enter") {
            if (document.getElementById("check-btn").style.display !== "none") checkWord();
            else if (document.getElementById("next-btn").style.display !== "none") nextWord();
        }
    });

    loadWords();
</script>
</body>
</html>
