<!DOCTYPE html>
<html>
<head>
    <title>Spelling Detective: Color-Phonetic Edition</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --part1: #0984e3; --part2: #e67e22; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 95%; margin-bottom: 20px; }
        
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; font-size: 0.9em; }
        .sentence { font-size: 1.25em; margin: 20px; font-style: italic; color: #444; min-height: 3.5em; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        
        /* THE COLOR-CODED PHONETIC BOX */
        #phonetic-display { display: none; background: #2d3436; padding: 15px; border-radius: 15px; font-size: 1.8em; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .p-part-0 { color: #74b9ff; } /* Light Blue */
        .p-part-1 { color: #fab1a0; } /* Soft Orange */
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .scrambled { font-size: 2.5em; font-weight: bold; letter-spacing: 8px; margin: 15px; text-transform: uppercase; min-height: 1.2em; }
        .char-pending { color: var(--primary); }
        .char-used { color: var(--error); text-decoration: line-through; opacity: 0.3; }
        
        input { font-size: 1.3em; padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 80%; outline: none; }
        button { font-size: 1.1em; padding: 12px 25px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: #fab1a0; color: #2d3436; }
        
        #report-screen { display: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" id="game-ui">
    <div class="stats-bar">
        <span>Session: <span id="current-count">1</span>/10</span>
        <span>Review List: <span id="review-count">0</span></span>
        <span>Total Perfects: <span id="lifetime-score">0</span></span>
    </div>
    
    <h1>Spelling Detective 🕵️‍♀️</h1>
    
    <div id="sentence-display" class="sentence">Loading Case Files...</div>
    
    <div id="phonetic-display"></div>

    <div id="scrambled-word" class="scrambled"></div>
    <input type="text" id="user-input" placeholder="Solve the mystery..." autocomplete="off" oninput="updateVisuals()">
    
    <div>
        <button class="btn-check" onclick="checkWord()">Check Spelling</button>
        <button class="btn-hint" onclick="giveHint()">Hint</button>
    </div>
    <div id="message" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="container" id="report-screen">
    <h1>Mission Complete! 🏆</h1>
    <div id="session-summary" style="margin-bottom: 20px; font-weight: bold; color: var(--primary);"></div>
    <table>
        <thead><tr><th>Word</th><th>Tries</th><th>Status</th></tr></thead>
        <tbody id="results-body"></tbody>
    </table>
    <br>
    <button class="btn-check" style="width:100%" onclick="startNewMission()">Next Mission</button>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv';

    let masterList = [];
    let sessionWords = [];
    let currentIndex = 0;
    let attemptsThisWord = 1;
    let sessionResults = [];

    // --- COLOR-CODED SYLLABLE ENGINE ---
    function displayPhonetic(word) {
        const pBox = document.getElementById("phonetic-display");
        
        // Simple syllabication logic
        let parts = word
            .replace(/([^aeiouy])([aeiouy][^aeiouy])(?=[aeiouy])/gi, '$1-$2')
            .replace(/([aeiouy])([^aeiouy][^aeiouy])([aeiouy])/gi, '$1$2-$3')
            .replace(/([aeiouy][^aeiouy])([^aeiouy][aeiouy])/gi, '$1-$2')
            .split('-');

        let html = "";
        parts.forEach((part, index) => {
            // Alternates between color class 0 and 1
            const colorClass = `p-part-${index % 2}`;
            html += `<span class="${colorClass}">${part.toUpperCase()}</span>`;
            if (index < parts.length - 1) html += "<span style='color:white; opacity:0.3;'>•</span>";
        });

        pBox.innerHTML = html;
        pBox.style.display = "block";
    }

    function cleanSentence(sentence, word) {
        if (!sentence) return "No clue provided.";
        const regex = new RegExp(word, "gi");
        return sentence.replace(regex, "_______");
    }

    async function loadWords() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            masterList = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let w = cols[0]?.replace(/^"|"$/g, '').trim().toUpperCase();
                let s = cols[1]?.replace(/^"|"$/g, '').trim();
                if (w && s) s = cleanSentence(s, w);
                return { word: w, sentence: s, isReview: false };
            }).filter(item => item.word && item.word.length > 1);
            startNewMission();
        } catch (e) {
            document.getElementById('sentence-display').innerText = "Link Error. Ensure the Google Sheet is Published to Web.";
        }
    }

    function startNewMission() {
        currentIndex = 0;
        sessionResults = [];
        updateStatsDisplay();
        document.getElementById("report-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        let reviews = (JSON.parse(localStorage.getItem('spellingReviewList')) || []).map(item => ({ ...item, isReview: true }));
        let sessionReviewWords = reviews.sort(() => Math.random() - 0.5).slice(0, 3);
        let sessionNewWords = masterList.sort(() => Math.random() - 0.5).slice(0, 10 - sessionReviewWords.length);
        sessionWords = [...sessionReviewWords, ...sessionNewWords].sort(() => Math.random() - 0.5);
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        attemptsThisWord = 1;
        let obj = sessionWords[currentIndex];
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("phonetic-display").style.display = "none";
        document.getElementById("sentence-display").innerHTML = (obj.sentence || "");
        document.getElementById("user-input").value = "";
        document.getElementById("message").innerText = "";
        obj.scrambled = obj.word.split('').sort(() => Math.random() - 0.5);
        updateVisuals();
        document.getElementById("user-input").focus();
    }

    function updateVisuals() {
        let typed = document.getElementById("user-input").value.toUpperCase().split('');
        let displayHTML = "";
        let tempTyped = [...typed];
        let obj = sessionWords[currentIndex];
        obj.scrambled.forEach(char => {
            let idx = tempTyped.indexOf(char);
            if (idx !== -1) {
                displayHTML += `<span class="char-used">${char}</span>`;
                tempTyped.splice(idx, 1);
            } else {
                displayHTML += `<span class="char-pending">${char}</span>`;
            }
        });
        document.getElementById("scrambled-word").innerHTML = displayHTML;
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let currentObj = sessionWords[currentIndex];
        let target = currentObj.word;

        if (guess === target) {
            displayPhonetic(target); // THE NEW COLOR TRIGGER
            
            saveHistory(target, attemptsThisWord);
            if (currentObj.isReview && attemptsThisWord === 1) removeFromReview(target);
            else if (attemptsThisWord > 1) saveToReview(currentObj);

            sessionResults.push({ word: target, tries: attemptsThisWord });
            currentIndex++;
            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = "✔ Correct!";
            
            setTimeout(showWord, 2500); // Give her time to read the colors
        } else {
            attemptsThisWord++;
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "❌ Try again!";
        }
    }

    function giveHint() {
        document.getElementById("message").style.color = "orange";
        document.getElementById("message").innerText = "Starts with: " + sessionWords[currentIndex].word[0];
    }

    function saveHistory(word, tries) {
        let history = JSON.parse(localStorage.getItem('spellingHistory')) || [];
        history.push({ word, tries });
        localStorage.setItem('spellingHistory', JSON.stringify(history));
    }
    function saveToReview(obj) {
        let list = JSON.parse(localStorage.getItem('spellingReviewList')) || [];
        if (!list.some(item => item.word === obj.word)) {
            list.push({ word: obj.word, sentence: obj.sentence });
            localStorage.setItem('spellingReviewList', JSON.stringify(list));
        }
    }
    function removeFromReview(word) {
        let list = (JSON.parse(localStorage.getItem('spellingReviewList')) || []).filter(i => i.word !== word);
        localStorage.setItem('spellingReviewList', JSON.stringify(list));
    }
    function updateStatsDisplay() {
        let history = JSON.parse(localStorage.getItem('spellingHistory')) || [];
        let reviews = JSON.parse(localStorage.getItem('spellingReviewList')) || [];
        document.getElementById('lifetime-score').innerText = history.filter(i => i.tries === 1).length;
        document.getElementById('review-count').innerText = reviews.length;
    }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        let body = document.getElementById("results-body");
        body.innerHTML = "";
        let perfects = sessionResults.filter(r => r.tries === 1).length;
        sessionResults.forEach(item => {
            let row = body.insertRow();
            row.innerHTML = `<td>${item.word}</td><td>${item.tries}</td><td>${item.tries === 1 ? "🌟" : "✅"}</td>`;
        });
        document.getElementById('session-summary').innerText = `Session Score: ${perfects} / 10 Perfects`;
    }

    document.getElementById("user-input").addEventListener("keyup", (e) => { if(e.key === "Enter") checkWord(); });
    loadWords();
</script>
</body>
</html>
