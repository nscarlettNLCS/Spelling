<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Detective: Daily Case</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f4f8; --dark: #2d3436; --gold: #f1c40f; --hint: #fd79a8; --warning: #e17055; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 650px; width: 95%; margin-bottom: 20px; }
        
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; font-size: 0.85em; }
        .round-indicator { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        
        /* SCRAMBLED LETTERS & CROSS OUT */
        .scrambled { font-size: 2.2em; font-weight: bold; letter-spacing: 6px; margin: 15px; text-transform: uppercase; min-height: 1.2em; color: var(--primary); }
        .letter-slot { display: inline-block; transition: 0.3s; }
        .used-letter { text-decoration: line-through; opacity: 0.3; color: var(--dark); }

        .sentence { font-size: 1.3em; margin: 20px; font-style: italic; color: #444; min-height: 3em; line-height: 1.4; }
        
        /* PHONETIC INTERACTIVE */
        #phonetic-reveal-area { display: none; margin: 20px 0; border-top: 2px solid #eee; padding-top: 15px; }
        .syllable-btn { background: #dfe6e9; border: 2px solid #b2bec3; padding: 12px 20px; margin: 5px; border-radius: 10px; cursor: pointer; font-size: 1.2em; font-weight: bold; color: transparent; user-select: none; transition: 0.2s; }
        .syllable-btn.revealed { color: var(--dark); background: white; border-color: var(--primary); transform: scale(1.05); }

        #grammar-box { display: none; background: #fff9db; border-left: 5px solid #f1c40f; padding: 15px; margin: 15px 0; border-radius: 5px; text-align: left; font-size: 0.95em; }
        
        input { font-size: 1.4em; padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 85%; outline: none; margin-bottom: 10px; text-align: center; }
        
        button.action-btn { font-size: 1em; padding: 12px 20px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-reveal { background: var(--warning); color: white; opacity: 0.5; cursor: not-allowed; }
        .btn-reveal.active { opacity: 1; cursor: pointer; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; }
        
        #game-ui, #report-screen, #reward-screen, #loading-screen { display: none; }
        #loading-screen { display: block; }
        .reward-btn { border: 2px solid var(--gold); color: #d35400; background: #fff9db; padding: 15px; margin: 10px auto; border-radius: 12px; cursor: pointer; font-weight: bold; width: 85%; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        #timer-text { font-size: 0.8em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container" id="loading-screen"><h1>Syncing Case Files... 🔍</h1></div>

<div class="container" id="game-ui">
    <div class="round-indicator" id="round-tag">Round 1: Investigation</div>
    <div class="stats-bar">
        <span>Word: <span id="current-count">1</span>/10</span>
        <span>Reveals: <span id="reveal-count">0</span>/3</span>
        <span>Score: <span id="score-display">0</span></span>
    </div>
    
    <div id="sentence-display" class="sentence"></div>
    <div id="scrambled-word" class="scrambled"></div>
    
    <input type="text" id="user-input" placeholder="Type here..." autocorrect="off" autocapitalize="none" spellcheck="false" autocomplete="off" oninput="updateScrambleStrike()">
    
    <div id="action-buttons">
        <button class="action-btn btn-check" id="check-btn" onclick="checkWord()">Check</button>
        <button class="action-btn btn-hint" id="hint-btn" onclick="showFirstLetter()">First Letter</button>
        <button class="action-btn btn-reveal" id="reveal-btn" onclick="revealFullWord()" disabled>Reveal Word</button>
    </div>
    <div id="timer-text">Reveal active in: <span id="timer-countdown">60</span>s</div>
    
    <div id="phonetic-reveal-area">
        <p><strong>Master the syllables!</strong> Click each block to continue:</p>
        <div id="syllable-container"></div>
    </div>

    <button class="action-btn btn-next" id="next-btn" onclick="nextWord()">Next Word →</button>

    <div id="grammar-box"></div>
    <div id="message" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="container" id="report-screen">
    <h1 id="report-title">Mission Update</h1>
    <div id="session-summary" style="font-size:1.5em; margin: 20px 0; font-weight: bold;"></div>
    <button class="action-btn btn-check" id="round-action-btn" style="width:100%" onclick="handleRoundTransition()"></button>
</div>

<div class="container" id="reward-screen">
    <h1>Promotion Earned! 🌟</h1>
    <p>Choose your reward and Mum & Dad will receive the report:</p>
    <button class="reward-btn" onclick="sendEmail('15 min Screen Time')">📱 15 min Screen Time</button>
    <button class="reward-btn" onclick="sendEmail('Ice-Cream')">🍦 Ice-Cream</button>
    <button class="reward-btn" onclick="sendEmail('2000 Won')">💰 2000 Won</button>
    <button class="reward-btn" style="border-color: #0984e3; color: #0984e3;" onclick="document.getElementById('custom-box').style.display='block'">✨ Something Else...</button>
    <div id="custom-box" style="display:none; margin-top:10px;">
        <input type="text" id="custom-text" placeholder="Type request...">
        <button class="action-btn btn-check" onclick="sendEmail('CUSTOM: ' + document.getElementById('custom-text').value)">Send Request</button>
    </div>
</div>

<script>
    const PARENT_EMAILS = "nscarlett@nlcsjeju.kr,okjuscarlett@gmail.com";
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv';

    let masterList = [], sessionWords = [], currentIndex = 0, currentRound = 1;
    let score = 0, revealsUsed = 0, revealTimer, secondsRemaining = 60;
    let correctWords = [], incorrectWords = [], currentScramble = [];

    async function loadWords() {
        try {
            const resp = await fetch(CSV_URL);
            const data = await resp.text();
            const rows = data.split(/\r?\n/).slice(1);
            masterList = rows.map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    word: c[0]?.replace(/^"|"$/g, '').trim().toUpperCase(), 
                    sentence: c[1]?.replace(/^"|"$/g, '').trim(),
                    phonetic: c[2]?.replace(/^"|"$/g, '').trim(),
                    grammar: c[3]?.replace(/^"|"$/g, '').trim(),
                    category: c[4]?.replace(/^"|"$/g, '').trim()
                };
            }).filter(item => item.word);
            startDailyQuiz();
        } catch (e) { alert("Data Sync Error"); }
    }

    function startDailyQuiz() {
        const g = masterList.filter(w => w.category === "Grammar Patterns").sort(() => 0.5 - Math.random()).slice(0, 3);
        const h = masterList.filter(w => w.category === "High-Impact").sort(() => 0.5 - Math.random()).slice(0, 3);
        const y = masterList.filter(w => w.category === "Year 5 and 6").sort(() => 0.5 - Math.random()).slice(0, 4);
        sessionWords = [...g, ...h, ...y].sort(() => 0.5 - Math.random());
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        setupRound();
    }

    function setupRound() {
        currentIndex = 0; revealsUsed = 0;
        if(currentRound === 2) { correctWords = []; incorrectWords = []; }
        document.getElementById("reveal-count").innerText = revealsUsed;
        document.getElementById("round-tag").innerText = currentRound === 1 ? "Round 1: Investigation" : "Round 2: Master Mode";
        document.getElementById("report-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        let obj = sessionWords[currentIndex];
        document.getElementById("score-display").innerText = score;
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("sentence-display").innerText = obj.sentence.replace(new RegExp(obj.word, 'gi'), "_______");
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("message").innerText = "";
        document.getElementById("grammar-box").style.display = "none";
        document.getElementById("phonetic-reveal-area").style.display = "none";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("hint-btn").style.display = "inline-block";
        document.getElementById("reveal-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        // Generate Scramble for Round 1
        if(currentRound === 1) {
            currentScramble = obj.word.split('').sort(() => 0.5 - Math.random());
            renderScramble();
        } else {
            document.getElementById("scrambled-word").innerHTML = "";
        }
        
        startRevealTimer();
        document.getElementById("user-input").focus();
    }

    function renderScramble() {
        const cont = document.getElementById("scrambled-word");
        cont.innerHTML = "";
        currentScramble.forEach((let, i) => {
            cont.innerHTML += `<span class="letter-slot" id="slot-${i}">${let}</span> `;
        });
    }

    function updateScrambleStrike() {
        if(currentRound !== 1) return;
        const input = document.getElementById("user-input").value.toUpperCase().split('');
        const slots = document.querySelectorAll(".letter-slot");
        slots.forEach(s => s.classList.remove("used-letter"));
        
        let tempInput = [...input];
        slots.forEach(slot => {
            let idx = tempInput.indexOf(slot.innerText);
            if(idx > -1) {
                slot.classList.add("used-letter");
                tempInput.splice(idx, 1);
            }
        });
    }

    function startRevealTimer() {
        clearInterval(revealTimer);
        secondsRemaining = 60;
        const btn = document.getElementById("reveal-btn");
        const txt = document.getElementById("timer-text");
        btn.disabled = true; btn.classList.remove("active"); txt.style.display = "block";
        revealTimer = setInterval(() => {
            secondsRemaining--;
            document.getElementById("timer-countdown").innerText = Math.max(0, secondsRemaining);
            if (secondsRemaining <= 0) {
                clearInterval(revealTimer);
                btn.disabled = false; btn.classList.add("active"); txt.style.display = "none";
            }
        }, 1000);
    }

    function revealFullWord() {
        revealsUsed++;
        document.getElementById("reveal-count").innerText = revealsUsed;
        if (revealsUsed > 3) { alert("Too many reveals! Restarting Case."); location.reload(); return; }
        
        if(currentRound === 2) { if(!incorrectWords.includes(sessionWords[currentIndex].word)) incorrectWords.push(sessionWords[currentIndex].word); }
        document.getElementById("message").innerText = `Word is: ${sessionWords[currentIndex].word}. Type it!`;
        document.getElementById("message").style.color = "var(--warning)";
        document.getElementById("reveal-btn").disabled = true;
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let target = sessionWords[currentIndex].word;
        if (guess === target) {
            if (currentRound === 2 && !document.getElementById("message").innerText.includes("Word is:")) {
                score++; correctWords.push(target);
            } else if (currentRound === 2) { /* already marked incorrect via reveal */ }
            handleSuccess();
        } else {
            document.getElementById("message").innerText = "❌ Keep trying!";
            document.getElementById("message").style.color = "var(--error)";
            if(currentRound === 2 && !incorrectWords.includes(target)) incorrectWords.push(target);
        }
    }

    function handleSuccess() {
        clearInterval(revealTimer);
        document.getElementById("user-input").disabled = true;
        document.getElementById("message").innerText = "✔ Correct!";
        document.getElementById("message").style.color = "var(--success)";
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("hint-btn").style.display = "none";
        document.getElementById("reveal-btn").style.display = "none";
        document.getElementById("timer-text").style.display = "none";

        // Syllable clicking requirement
        const area = document.getElementById("phonetic-reveal-area");
        const cont = document.getElementById("syllable-container");
        area.style.display = "block";
        cont.innerHTML = "";
        let parts = (sessionWords[currentIndex].phonetic || sessionWords[currentIndex].word).split(/[•·\-\s/]+/).filter(p => p.trim());
        
        let revealedCount = 0;
        parts.forEach(p => {
            let btn = document.createElement("button");
            btn.className = "syllable-btn";
            btn.innerText = p.toUpperCase();
            btn.onclick = function() {
                if(!this.classList.contains("revealed")) {
                    this.classList.add("revealed");
                    revealedCount++;
                    if(revealedCount === parts.length) document.getElementById("next-btn").style.display = "block";
                }
            };
            cont.appendChild(btn);
        });

        if(sessionWords[currentIndex].grammar) {
            document.getElementById("grammar-box").innerText = sessionWords[currentIndex].grammar;
            document.getElementById("grammar-box").style.display = "block";
        }
    }

    function nextWord() { currentIndex++; showWord(); }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        if (currentRound === 1) {
            document.getElementById("session-summary").innerText = "Round 1 Done!";
            document.getElementById("round-action-btn").innerText = "Start Master Mode";
        } else {
            const pct = (score / 10) * 100;
            document.getElementById("session-summary").innerText = `Mastery: ${pct}%`;
            document.getElementById("round-action-btn").innerText = (pct >= 90) ? "Pick Reward! 🎁" : "Restart Session";
        }
    }

    function handleRoundTransition() {
        if (currentRound === 1) { currentRound = 2; score = 0; setupRound(); }
        else if (score >= 9) { document.getElementById("report-screen").style.display = "none"; document.getElementById("reward-screen").style.display = "inline-block"; }
        else { location.reload(); }
    }

    function showFirstLetter() {
        document.getElementById("message").innerText = `Hint: Starts with "${sessionWords[currentIndex].word.charAt(0)}"`;
        document.getElementById("message").style.color = "var(--hint)";
    }

    function sendEmail(reward) {
        let body = `Hi Mum & Dad!\n
