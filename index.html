<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Detective: Daily Case</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f4f8; --dark: #2d3436; --gold: #f1c40f; --hint: #fd79a8; --warning: #e17055; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { background: white; padding: 30px; border-radius: 24px; display: inline-block; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 650px; width: 95%; margin-bottom: 20px; border: 4px solid #fff; }
        
        /* Stats & UI */
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #f8f9fa; padding: 12px; border-radius: 15px; }
        .round-indicator { background: linear-gradient(135deg, var(--primary), #a29bfe); color: white; padding: 8px 20px; border-radius: 50px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        
        /* Scramble & Letters */
        .scrambled { font-size: 2.2em; font-weight: 900; letter-spacing: 8px; margin: 20px; text-transform: uppercase; color: var(--primary); }
        .letter-slot { display: inline-block; transition: 0.3s; }
        .used-letter { text-decoration: line-through; opacity: 0.2; transform: scale(0.8); color: #b2bec3; }

        .sentence { font-size: 1.3em; margin: 20px; font-style: italic; color: #555; background: #fdfdfd; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); }
        
        /* Phonetic Blocks */
        #phonetic-reveal-area { display: none; margin: 20px 0; padding: 20px; background: #f1f2f6; border-radius: 15px; }
        .syllable-btn { border: none; padding: 15px 25px; margin: 5px; border-radius: 12px; cursor: pointer; font-size: 1.3em; font-weight: 800; color: transparent; transition: 0.3s; }
        .syl-0 { background: #fab1a0; } .syl-1 { background: #74b9ff; } .syl-2 { background: #55efc4; } .syl-3 { background: #a29bfe; } .syl-4 { background: #ffeaa7; }
        .syllable-btn.revealed { color: white; transform: translateY(-3px); }

        /* Input & Buttons */
        input { font-size: 1.5em; padding: 15px; border-radius: 15px; border: 3px solid #dfe6e9; width: 85%; outline: none; margin-bottom: 10px; text-align: center; }
        button.action-btn { font-size: 1.1em; padding: 14px 24px; margin: 5px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-reveal { background: var(--warning); color: white; opacity: 0.5; }
        .btn-reveal.active { opacity: 1; cursor: pointer; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; font-size: 1.3em; }
        
        #game-ui, #report-screen, #reward-screen, #loading-screen { display: none; }
        #loading-screen { display: block; }
        .feedback-chip { font-size: 1.5em; font-weight: bold; margin: 10px; padding: 10px; border-radius: 10px; display: none; }
        .reward-btn { border: 3px solid var(--gold); color: #d35400; background: #fff9db; padding: 18px; margin: 12px auto; border-radius: 18px; cursor: pointer; font-weight: 800; width: 90%; display: flex; align-items: center; justify-content: center; }
        #timer-text { font-size: 0.9em; font-weight: bold; color: var(--warning); }
    </style>
</head>
<body>

<div class="container" id="loading-screen">
    <h1 id="loading-text">🚀 Syncing Case Files...</h1>
    <button id="manual-start" style="display:none; padding:10px 20px; border-radius:10px; cursor:pointer;" onclick="forceStart()">Start Manually</button>
</div>

<div class="container" id="game-ui">
    <div class="round-indicator" id="round-tag">Investigation Mode 🔍</div>
    <div class="stats-bar">
        <span>Word <span id="current-count">1</span>/10</span>
        <span>Reveals: <span id="reveal-count">0</span>/3</span>
        <span>🔥 Score: <span id="score-display">0</span></span>
    </div>
    
    <div id="sentence-display" class="sentence"></div>
    <div id="scrambled-word" class="scrambled"></div>
    
    <input type="text" id="user-input" placeholder="Type here..." autocorrect="off" autocapitalize="none" spellcheck="false" autocomplete="off" oninput="updateScrambleStrike()">
    
    <div id="action-buttons">
        <button class="action-btn btn-check" id="check-btn" onclick="checkWord()">Check</button>
        <button class="action-btn btn-hint" id="hint-btn" onclick="showFirstLetter()">Hint</button>
        <button class="action-btn btn-reveal" id="reveal-btn" onclick="revealFullWord()" disabled>Reveal</button>
    </div>
    <div id="timer-text">Unlock Reveal in: <span id="timer-countdown">60</span>s</div>
    
    <div id="feedback-area" class="feedback-chip"></div>

    <div id="phonetic-reveal-area">
        <p><strong>Training Exercise:</strong> Click the sound blocks!</p>
        <div id="syllable-container"></div>
    </div>

    <button class="action-btn btn-next" id="next-btn" onclick="nextWord()">Next Mission →</button>
</div>

<div class="container" id="report-screen">
    <h1>Mission Summary</h1>
    <div id="session-summary" style="font-size:1.8em; margin: 25px 0;"></div>
    <button class="action-btn btn-check" id="round-action-btn" style="width:100%" onclick="handleRoundTransition()"></button>
</div>

<div class="container" id="reward-screen">
    <h1>Promotion Earned! 🌟</h1>
    <button class="reward-btn" onclick="sendEmail('15 min Screen Time')">📱 15 min Screen Time</button>
    <button class="reward-btn" onclick="sendEmail('Ice-Cream')">🍦 Ice-Cream</button>
    <button class="reward-btn" onclick="sendEmail('2000 Won')">💰 2000 Won</button>
</div>

<script>
    const PARENT_EMAILS = "nscarlett@nlcsjeju.kr,okjuscarlett@gmail.com";
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv';

    // Emergency backup words from your PDF if CSV fails
    const backupWords = ["ACCOMMODATE", "AGGRESSIVE", "AMATEUR", "APPARENT", "APPRECIATE", "CEMETERY", "COMMITTEE", "COMMUNICATE", "CONSCIENCE", "CONSCIOUS", "CONTROVERSY", "CONVENIENCE", "CORRESPOND", "CRITICISE", "CURIOSITY", "DEFINITE", "DESPERATE", "DETERMINED", "DICTIONARY", "DISASTROUS", "EMBARRASS", "ENVIRONMENT", "EQUIPMENT", "EXAGGERATE", "EXCELLENT", "EXISTENCE", "EXPLANATION", "FAMILIAR", "FOREIGN", "FORTY", "FREQUENTLY", "GOVERNMENT", "GUARANTEE", "HARASS", "HINDRANCE", "IDENTITY", "IMMEDIATE", "INDIVIDUAL", "INTERFERE", "INTERRUPT", "LANGUAGE", "LEISURE", "LIGHTNING", "MARVELLOUS", "MISCHIEVOUS", "MUSCLE", "NECESSARY", "NEIGHBOUR", "NUISANCE", "OCCUPY", "OCCUR", "OPPORTUNITY", "PARLIAMENT", "PERSUADE", "PHYSICAL", "PRIVILEGE", "PROFESSION", "PROGRAMME", "PRONUNCIATION", "QUEUE", "RECOGNISE", "RECOMMEND", "RELEVANT", "RESTAURANT", "RHYME", "RHYTHM", "SACRIFICE", "SECRETARY", "SHOULDER", "SIGNATURE", "SINCERE", "SINCERELY", "SOLDIER", "STOMACH", "SUGGEST", "SYMBOL", "SYSTEM", "TEMPERATURE", "THOROUGH", "TWELFTH", "VARIETY", "VEGETABLE", "VEHICLE", "YACHT"];

    let masterList = [], sessionWords = [], currentIndex = 0, currentRound = 1;
    let score = 0, revealsUsed = 0, revealTimer, secondsRemaining = 60;
    let correctWords = [], incorrectWords = [], currentScramble = [], needsTraining = false;

    // Timer to show manual start if sync hangs
    setTimeout(() => { document.getElementById('manual-start').style.display = 'inline-block'; }, 4000);

    async function loadWords() {
        try {
            const resp = await fetch(CSV_URL);
            if (!resp.ok) throw new Error();
            const data = await resp.text();
            const rows = data.split(/\r?\n/).slice(1);
            masterList = rows.map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    word: c[0]?.replace(/^"|"$/g, '').trim().toUpperCase(), 
                    sentence: c[1]?.replace(/^"|"$/g, '').trim() || "Spell the word: " + c[0],
                    phonetic: c[2]?.replace(/^"|"$/g, '').trim(),
                    category: c[4]?.replace(/^"|"$/g, '').trim()
                };
            }).filter(item => item.word);
            startDailyQuiz();
        } catch (e) {
            console.log("Using backup words...");
            masterList = backupWords.map(w => ({ word: w, sentence: "Can you spell the word correctly?", category: "Year 5 and 6" }));
            startDailyQuiz();
        }
    }

    function forceStart() { startDailyQuiz(); }

    function startDailyQuiz() {
        const g = masterList.filter(w => w.category === "Grammar Patterns").sort(() => 0.5 - Math.random()).slice(0, 3);
        const h = masterList.filter(w => w.category === "High-Impact").sort(() => 0.5 - Math.random()).slice(0, 3);
        const y = masterList.filter(w => w.category === "Year 5 and 6").sort(() => 0.5 - Math.random()).slice(0, 4);
        
        sessionWords = [...g, ...h, ...y];
        if(sessionWords.length < 10) {
            sessionWords = masterList.sort(() => 0.5 - Math.random()).slice(0, 10);
        }
        
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        setupRound();
    }

    function setupRound() {
        currentIndex = 0; revealsUsed = 0;
        if(currentRound === 2) { correctWords = []; incorrectWords = []; }
        document.getElementById("round-tag").innerText = currentRound === 1 ? "Round 1: Investigation" : "Round 2: Master Mode";
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        let obj = sessionWords[currentIndex];
        needsTraining = false;
        document.getElementById("score-display").innerText = score;
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("sentence-display").innerText = obj.sentence.replace(new RegExp(obj.word, 'gi'), "_______");
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("feedback-area").style.display = "none";
        document.getElementById("phonetic-reveal-area").style.display = "none";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("hint-btn").style.display = "inline-block";
        document.getElementById("reveal-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        if(currentRound === 1) {
            currentScramble = obj.word.split('').sort(() => 0.5 - Math.random());
            renderScramble();
        } else { document.getElementById("scrambled-word").innerHTML = ""; }
        
        startRevealTimer();
        document.getElementById("user-input").focus();
    }

    function renderScramble() {
        const cont = document.getElementById("scrambled-word");
        cont.innerHTML = "";
        currentScramble.forEach((l, i) => {
            cont.innerHTML += `<span class="letter-slot" id="slot-${i}">${l}</span> `;
        });
    }

    function updateScrambleStrike() {
        if(currentRound !== 1) return;
        const input = document.getElementById("user-input").value.toUpperCase().split('');
        const slots = document.querySelectorAll(".letter-slot");
        slots.forEach(s => s.classList.remove("used-letter"));
        let tempInput = [...input];
        slots.forEach(slot => {
            let idx = tempInput.indexOf(slot.innerText);
            if(idx > -1) { slot.classList.add("used-letter"); tempInput.splice(idx, 1); }
        });
    }

    function startRevealTimer() {
        clearInterval(revealTimer);
        secondsRemaining = 60;
        const btn = document.getElementById("reveal-btn");
        const txt = document.getElementById("timer-text");
        btn.disabled = true; btn.classList.remove("active"); txt.style.display = "block";
        revealTimer = setInterval(() => {
            secondsRemaining--;
            document.getElementById("timer-countdown").innerText = Math.max(0, secondsRemaining);
            if (secondsRemaining <= 0) {
                clearInterval(revealTimer);
                btn.disabled = false; btn.classList.add("active"); txt.style.display = "none";
            }
        }, 1000);
    }

    function showFirstLetter() {
        const f = sessionWords[currentIndex].word.charAt(0);
        showFeedback(`Hint: Starts with "${f}"`, "var(--hint)");
        needsTraining = true;
    }

    function revealFullWord() {
        revealsUsed++;
        document.getElementById("reveal-count").innerText = revealsUsed;
        if (revealsUsed > 3) { alert("Too many reveals used! Restarting."); location.reload(); return; }
        needsTraining = true;
        if(currentRound === 2) { if(!incorrectWords.includes(sessionWords[currentIndex].word)) incorrectWords.push(sessionWords[currentIndex].word); }
        showFeedback(`Word is: ${sessionWords[currentIndex].word}`, "var(--warning)");
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let target = sessionWords[currentIndex].word;
        if (guess === target) {
            if (currentRound === 2 && !needsTraining) { score++; correctWords.push(target); }
            handleSuccess();
        } else {
            needsTraining = true;
            showFeedback("❌ Try again!", "var(--error)");
            if(currentRound === 2 && !incorrectWords.includes(target)) incorrectWords.push(target);
        }
    }

    function showFeedback(text, color) {
        const fb = document.getElementById("feedback-area");
        fb.innerText = text; fb.style.backgroundColor = color; fb.style.color = "white"; fb.style.display = "block";
    }

    function handleSuccess() {
        clearInterval(revealTimer);
        document.getElementById("user-input").disabled = true;
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("hint-btn").style.display = "none";
        document.getElementById("reveal-btn").style.display = "none";
        document.getElementById("timer-text").style.display = "none";

        if (!needsTraining) {
            showFeedback("💎 PERFECT!", "var(--success)");
            document.getElementById("next-btn").style.display = "block";
        } else {
            showFeedback("✅ Correct!", "#636e72");
            setupPhoneticTraining();
        }
    }

    function setupPhoneticTraining() {
        const area = document.getElementById("phonetic-reveal-area");
        const cont = document.getElementById("syllable-container");
        area.style.display = "block";
        cont.innerHTML = "";
        let parts = (sessionWords[currentIndex].phonetic || sessionWords[currentIndex].word).split(/[•·\-\s/]+/).filter(p => p.trim());
        let revealed = 0;
        parts.forEach((p, i) => {
            let btn = document.createElement("button");
            btn.className = `syllable-btn syl-${i % 5}`;
            btn.innerText = p.toUpperCase();
            btn.onclick = function() {
                if(!this.classList.contains("revealed")) {
                    this.classList.add("revealed"); revealed++;
                    if(revealed === parts.length) document.getElementById("next-btn").style.display = "block";
                }
            };
            cont.appendChild(btn);
        });
    }

    function nextWord() { currentIndex++; showWord(); }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        if (currentRound === 1) {
            document.getElementById("session-summary").innerText = "Round 1 Complete!";
            document.getElementById("round-action-btn").innerText = "Start Round 2";
        } else {
            const pct = (score / 10) * 100;
            document.getElementById("session-summary").innerText = `Final Score: ${pct}%`;
            document.getElementById("round-action-btn").innerText = (pct >= 90) ? "Pick Reward! 🎁" : "Try Again";
        }
    }

    function handleRoundTransition() {
        if (currentRound === 1) { currentRound = 2; score = 0; setupRound(); }
        else if (score >= 9) { document.getElementById("report-screen").style.display = "none"; document.getElementById("reward-screen").style.display = "inline-block"; }
        else { location.reload(); }
    }

    function sendEmail(reward) {
        let b = `Report:\nScore: ${score}/10\nReward: ${reward}\n\nMastered: ${correctWords.join(", ") || "None"}\nStudy: ${incorrectWords.join(", ") || "None"}`;
        window.location.href = `mailto:${PARENT_EMAILS}?subject=Spelling Reward&body=${encodeURIComponent(b)}`;
        alert("Sent!"); location.reload();
    }

    loadWords();
</script>
</body>
</html>
