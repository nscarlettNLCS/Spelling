<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Detective: Intelligence Case</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f4f8; --dark: #2d3436; --gold: #f1c40f; --hint: #fd79a8; --warning: #e17055; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { background: white; padding: 30px; border-radius: 24px; display: inline-block; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 650px; width: 95%; margin-bottom: 20px; border: 4px solid #fff; }
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #f8f9fa; padding: 12px; border-radius: 15px; font-size: 0.9em; }
        .round-indicator { background: linear-gradient(135deg, var(--primary), #a29bfe); color: white; padding: 8px 20px; border-radius: 50px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        .scrambled { font-size: 2.2em; font-weight: 900; letter-spacing: 8px; margin: 20px; text-transform: uppercase; color: var(--primary); min-height: 1.2em; }
        .letter-slot { display: inline-block; transition: 0.3s; }
        .used-letter { text-decoration: line-through; opacity: 0.2; transform: scale(0.8); color: #b2bec3; }
        .sentence { font-size: 1.3em; margin: 20px; font-style: italic; color: #555; background: #fdfdfd; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); }
        #phonetic-reveal-area { display: none; margin: 20px 0; padding: 20px; background: #f1f2f6; border-radius: 15px; }
        .syllable-btn { border: none; padding: 15px 25px; margin: 5px; border-radius: 12px; cursor: pointer; font-size: 1.3em; font-weight: 800; color: transparent; transition: 0.3s; background: #dfe6e9; }
        .syllable-btn.revealed { color: white; background: var(--primary); transform: translateY(-3px); }
        input { font-size: 1.5em; padding: 15px; border-radius: 15px; border: 3px solid #dfe6e9; width: 85%; text-align: center; margin-bottom: 10px; outline: none; }
        button.action-btn { font-size: 1.1em; padding: 14px 24px; margin: 5px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-reveal { background: var(--warning); color: white; opacity: 0.5; }
        .btn-reveal.active { opacity: 1; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; font-size: 1.3em; }
        #game-ui, #report-screen, #reward-screen { display: none; }
        .reward-btn { border: 3px solid var(--gold); background: #fff9db; padding: 18px; margin: 12px auto; border-radius: 18px; cursor: pointer; font-weight: 800; width: 90%; font-size: 1.2em; display: block; }
    </style>
</head>
<body>

<div class="container" id="loading-screen">
    <h1>🔍 Detective Intelligence</h1>
    <p id="status-text">Fetching latest files from HQ...</p>
    <button class="action-btn btn-check" id="start-btn" onclick="startGame()" style="display:none;">START MISSION</button>
</div>

<div class="container" id="game-ui">
    <div id="round-tag" class="round-indicator">Round 1: Investigation 🔍</div>
    <div class="stats-bar">
        <span>Case <span id="current-count">1</span>/5</span>
        <span>🔥 Score: <span id="score-display">0</span></span>
    </div>
    <div id="sentence-display" class="sentence"></div>
    <div id="scrambled-word" class="scrambled"></div>
    <input type="text" id="user-input" placeholder="Solve the word..." autocomplete="off" oninput="updateScrambleStrike()">
    <div id="action-buttons">
        <button class="action-btn btn-check" id="check-btn" onclick="checkWord()">Check</button>
        <button class="action-btn btn-hint" id="hint-btn" onclick="showFirstLetter()">Hint</button>
        <button class="action-btn btn-reveal" id="reveal-btn" onclick="revealFullWord()" disabled>Reveal</button>
    </div>
    <div id="timer-text" style="font-size: 0.8em; margin-top:5px; color: var(--warning);">Reveal unlocks in: <span id="timer-countdown">60</span>s</div>
    <div id="feedback-area" style="font-size: 1.3em; margin: 10px; font-weight: bold; border-radius: 10px; padding: 10px; display:none; color: white;"></div>
    <div id="phonetic-reveal-area">
        <p><strong>Training:</strong> Click all sound blocks!</p>
        <div id="syllable-container"></div>
    </div>
    <button class="action-btn btn-next" id="next-btn" onclick="nextWord()">Next Word →</button>
</div>

<div class="container" id="report-screen">
    <h1 id="report-header">Mission Status</h1>
    <div id="session-summary" style="font-size:1.5em; margin: 25px 0; line-height: 1.6;"></div>
    <button class="action-btn btn-check" id="round-action-btn" style="width:100%" onclick="handleRoundTransition()"></button>
</div>

<div class="container" id="reward-screen">
    <h1>Promotion Earned! 🌟</h1>
    <button class="reward-btn" onclick="sendEmail('15 min Screen Time')">📱 15 min Screen Time</button>
    <button class="reward-btn" onclick="sendEmail('Ice-Cream')">🍦 Ice-Cream</button>
    <button class="reward-btn" onclick="sendEmail('2000 Won')">💰 2000 Won</button>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv'; // MUST BE THE CSV LINK
    const PARENT_EMAILS = "nscarlett@nlcsjeju.kr,okjuscarlett@gmail.com";

    let allWords = [], sessionWords = [], currentIndex = 0, currentRound = 1, score = 0;
    let troubleWords = JSON.parse(localStorage.getItem('troubleWords')) || [];
    let masteredWords = JSON.parse(localStorage.getItem('masteredWords')) || [];
    let sessionResults = { correct: [], needsPractice: [] };
    let needsTraining = false, revealTimer, secondsRemaining = 60;

    window.onload = async function() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            
            // Safety Check: If it looks like HTML, the user grabbed the wrong link
            if (data.includes("<!DOCTYPE") || data.includes("<html")) {
                document.getElementById("status-text").innerText = "⚠️ Error: You used the 'Web Page' link instead of the 'CSV' link in Google Sheets!";
                return;
            }

            allWords = parseCSV(data);
            document.getElementById("status-text").innerText = `Ready. Tracking ${troubleWords.length} tricky words.`;
            document.getElementById("start-btn").style.display = "inline-block";
        } catch (e) {
            document.getElementById("status-text").innerText = "Connection error. Please check the link.";
        }
    };

    function parseCSV(text) {
        return text.split('\n')
            .filter(line => line.trim() !== "" && !line.startsWith('<')) // Ignore empty or HTML lines
            .slice(1) // Skip Header
            .map(line => {
                const parts = line.split(',');
                return { 
                    word: parts[0]?.trim().toUpperCase(), 
                    sentence: parts[1]?.trim(), 
                    phonetic: parts[2]?.trim() || parts[0]?.trim()
                };
            }).filter(item => item.word && item.word.length > 1);
    }

    function startGame() {
        // Priority: Words she failed before
        let selection = allWords.filter(w => troubleWords.includes(w.word))
                                .sort(() => 0.5 - Math.random()).slice(0, 3);
        
        // Fill remaining with new words she hasn't mastered yet
        let available = allWords.filter(w => !selection.includes(w) && !masteredWords.includes(w.word));
        let fillCount = 5 - selection.length;
        let freshWords = available.sort(() => 0.5 - Math.random()).slice(0, fillCount);

        sessionWords = [...selection, ...freshWords].sort(() => 0.5 - Math.random());
        
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        currentRound = 1; 
        setupRound();
    }

    function setupRound() {
        currentIndex = 0; 
        document.getElementById("report-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        document.getElementById("round-tag").innerText = currentRound === 1 ? "Round 1: Investigation 🔍" : "Round 2: Master Mode 🔥";
        if(currentRound === 1) score = 0; 
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        let obj = sessionWords[currentIndex];
        needsTraining = false;
        
        document.getElementById("score-display").innerText = score;
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("sentence-display").innerText = obj.sentence;
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("feedback-area").style.display = "none";
        document.getElementById("phonetic-reveal-area").style.display = "none";
        document.getElementById("action-buttons").style.display = "block";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("hint-btn").style.display = "inline-block";
        document.getElementById("reveal-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        
        const scrambleArea = document.getElementById("scrambled-word");
        if(currentRound === 1) {
            let letters = obj.word.split('').sort(() => 0.5 - Math.random());
            scrambleArea.innerHTML = letters.map((l, i) => `<span class="letter-slot" id="slot-${i}">${l}</span>`).join(' ');
        } else {
            scrambleArea.innerHTML = ""; 
        }
        
        startRevealTimer();
        setTimeout(() => document.getElementById("user-input").focus(), 100);
    }

    function startRevealTimer() {
        clearInterval(revealTimer);
        secondsRemaining = 60; 
        const btn = document.getElementById("reveal-btn");
        const txt = document.getElementById("timer-text");
        btn.disabled = true; btn.classList.remove("active"); txt.style.display = "block";
        revealTimer = setInterval(() => {
            secondsRemaining--;
            document.getElementById("timer-countdown").innerText = Math.max(0, secondsRemaining);
            if (secondsRemaining <= 0) {
                clearInterval(revealTimer);
                btn.disabled = false; btn.classList.add("active"); txt.style.display = "none";
            }
        }, 1000);
    }

    function updateScrambleStrike() {
        if(currentRound !== 1) return;
        const input = document.getElementById("user-input").value.toUpperCase().split('');
        const slots = document.querySelectorAll(".letter-slot");
        slots.forEach(s => s.classList.remove("used-letter"));
        let tempInput = [...input];
        slots.forEach(slot => {
            let idx = tempInput.indexOf(slot.innerText);
            if(idx > -1) { slot.classList.add("used-letter"); tempInput.splice(idx, 1); }
        });
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let target = sessionWords[currentIndex].word;
        
        if (guess === target) {
            if (currentRound === 2 && !needsTraining) { 
                score++; 
                if(!sessionResults.correct.includes(target)) sessionResults.correct.push(target);
                troubleWords = troubleWords.filter(w => w !== target);
                if(!masteredWords.includes(target)) masteredWords.push(target);
            }
            handleSuccess();
        } else {
            needsTraining = true;
            showFeedback("❌ Try again!", "var(--error)");
            if(!troubleWords.includes(target)) troubleWords.push(target);
            masteredWords = masteredWords.filter(w => w !== target);
        }
        localStorage.setItem('troubleWords', JSON.stringify(troubleWords));
        localStorage.setItem('masteredWords', JSON.stringify(masteredWords));
    }

    function revealFullWord() {
        needsTraining = true;
        let target = sessionWords[currentIndex].word;
        if(!troubleWords.includes(target)) troubleWords.push(target);
        localStorage.setItem('troubleWords', JSON.stringify(troubleWords));
        showFeedback(`Word: ${target}`, "var(--warning)");
    }

    function showFirstLetter() {
        needsTraining = true;
        showFeedback(`Starts with: ${sessionWords[currentIndex].word[0]}`, "var(--hint)");
    }

    function handleSuccess() {
        clearInterval(revealTimer);
        document.getElementById("user-input").disabled = true;
        document.getElementById("timer-text").style.display = "none";
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("hint-btn").style.display = "none";
        document.getElementById("reveal-btn").style.display = "none";

        if (!needsTraining) {
            showFeedback("💎 PERFECT!", "var(--success)");
            document.getElementById("next-btn").style.display = "block";
        } else {
            showFeedback("✅ Correct!", "#636e72");
            setupPhoneticTraining();
        }
    }

    function setupPhoneticTraining() {
        const area = document.getElementById("phonetic-reveal-area");
        const cont = document.getElementById("syllable-container");
        area.style.display = "block"; cont.innerHTML = "";
        let parts = (sessionWords[currentIndex].phonetic).split(/[•·\-\s/]+/).filter(p => p.trim());
        let clicked = 0;
        parts.forEach((p) => {
            let btn = document.createElement("button");
            btn.className = `syllable-btn`;
            btn.innerText = p.toUpperCase();
            btn.onclick = function() {
                if(!this.classList.contains("revealed")) {
                    this.classList.add("revealed"); clicked++;
                    if(clicked === parts.length) document.getElementById("next-btn").style.display = "block";
                }
            };
            cont.appendChild(btn);
        });
    }

    function nextWord() { 
        currentIndex++; 
        showWord(); 
    }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        const sum = document.getElementById("session-summary");
        
        if (currentRound === 1) {
            sum.innerHTML = "Investigation Complete!<br>Ready for Master Mode? (The scrambled letters will vanish!)";
            document.getElementById("round-action-btn").innerText = "Start Round 2";
        } else {
            sum.innerHTML = `<strong>Final Mastery: ${score}/5</strong><br>Words Mastered Today: ${sessionResults.correct.length}`;
            document.getElementById("round-action-btn").innerText = (score >= 4) ? "Claim Reward! 🎁" : "Retry Master Mode";
        }
    }

    function handleRoundTransition() {
        if (currentRound === 1) { 
            currentRound = 2; 
            setupRound(); 
        } else if (score >= 4) { 
            document.getElementById("report-screen").style.display = "none"; 
            document.getElementById("reward-screen").style.display = "inline-block"; 
        } else { 
            currentRound = 2; // Keep them in Round 2 until they pass
            setupRound();
        }
    }

    function showFeedback(text, color) {
        const fb = document.getElementById("feedback-area");
        fb.innerText = text; fb.style.backgroundColor = color; fb.style.display = "block";
    }

    function sendEmail(reward) {
        let b = `Detective Report:\nScore: ${score}/5\nReward: ${reward}\n\nMastered:\n${sessionResults.correct.join(", ") || "None"}`;
        window.location.href = `mailto:${PARENT_EMAILS}?subject=Spelling Reward Claimed&body=${encodeURIComponent(b)}`;
        alert("Sent to Dad!"); location.reload();
    }
</script>
</body>
</html>
