<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Detective: Daily Case</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f4f8; --dark: #2d3436; --gold: #f1c40f; --hint: #fd79a8; --warning: #e17055; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 650px; width: 95%; margin-bottom: 20px; }
        
        .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: var(--primary); margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; font-size: 0.85em; }
        .round-indicator { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        .sentence { font-size: 1.3em; margin: 20px; font-style: italic; color: #444; min-height: 3em; line-height: 1.4; }
        
        #grammar-box { display: none; background: #fff9db; border-left: 5px solid #f1c40f; padding: 15px; margin: 15px 0; border-radius: 5px; text-align: left; font-size: 0.95em; }
        .scrambled { font-size: 2.2em; font-weight: bold; letter-spacing: 6px; margin: 15px; text-transform: uppercase; min-height: 1.2em; color: var(--primary); }
        
        input { font-size: 1.4em; padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 85%; outline: none; margin-bottom: 10px; text-align: center; }
        
        button.action-btn { font-size: 1em; padding: 12px 20px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-reveal { background: var(--warning); color: white; opacity: 0.5; cursor: not-allowed; }
        .btn-reveal.active { opacity: 1; cursor: pointer; }
        .btn-next { background: var(--primary); color: white; display: none; width: 100%; }
        
        #game-ui, #report-screen, #reward-screen, #loading-screen { display: none; }
        #loading-screen { display: block; }
        
        .reward-btn { border: 2px solid var(--gold); color: #d35400; background: #fff9db; padding: 15px; margin: 10px auto; border-radius: 12px; cursor: pointer; font-weight: bold; width: 85%; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
        #custom-reward-input { display: none; margin-top: 15px; }
        #timer-text { font-size: 0.8em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container" id="loading-screen"><h1>Loading Daily Case... 🔍</h1></div>

<div class="container" id="game-ui">
    <div class="round-indicator" id="round-tag">Round 1: Investigation</div>
    <div class="stats-bar">
        <span>Word: <span id="current-count">1</span>/10</span>
        <span>Reveals: <span id="reveal-count">0</span>/3</span>
        <span>Score: <span id="score-display">0</span></span>
    </div>
    
    <div id="sentence-display" class="sentence"></div>
    <div id="scrambled-word" class="scrambled"></div>
    
    <input type="text" id="user-input" placeholder="Type here..." autocorrect="off" autocapitalize="none" spellcheck="false" autocomplete="off">
    
    <div id="action-buttons">
        <button class="action-btn btn-check" id="check-btn" onclick="checkWord()">Check</button>
        <button class="action-btn btn-hint" id="hint-btn" onclick="showFirstLetter()">First Letter</button>
        <button class="action-btn btn-reveal" id="reveal-btn" onclick="revealFullWord()" disabled>Reveal Word</button>
    </div>
    <div id="timer-text">Reveal active in: <span id="timer-countdown">60</span>s</div>
    <button class="action-btn btn-next" id="next-btn" onclick="nextWord()">Next Word →</button>

    <div id="grammar-box"></div>
    <div id="message" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="container" id="report-screen">
    <h1 id="report-title">Mission Update</h1>
    <div id="session-summary" style="font-size:1.5em; margin: 20px 0; font-weight: bold;"></div>
    <button class="action-btn btn-check" id="round-action-btn" style="width:100%" onclick="handleRoundTransition()"></button>
</div>

<div class="container" id="reward-screen">
    <h1>Promotion Earned! 🌟</h1>
    <p>Choose your reward to notify Mum & Dad:</p>
    <button class="reward-btn" onclick="sendRewardEmail('15 min Screen Time')">📱 15 min Screen Time</button>
    <button class="reward-btn" onclick="sendRewardEmail('Ice-Cream')">🍦 Ice-Cream</button>
    <button class="reward-btn" onclick="sendRewardEmail('2000 Won')">💰 2000 Won</button>
    
    <button class="reward-btn" style="border-color: #0984e3; color: #0984e3;" onclick="showCustomInput()">✨ Something Else...</button>
    
    <div id="custom-reward-input">
        <input type="text" id="custom-text" placeholder="Enter your request here..." autocorrect="off" spellcheck="false">
        <button class="action-btn btn-check" onclick="sendCustomReward()">Send Request</button>
    </div>
</div>

<script>
    const PARENT_EMAILS = "nscarlett@nlcsjeju.kr,okjuscarlett@gmail.com";
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVe2EQ9TBMhPUakjQ9Vju7HzMm77G2GstwkDpBVyOYabyBsLSvxjyTF4W_nfItlcZbpMqOYQ59e0Ss/pub?output=csv';

    let masterList = [];
    let sessionWords = [];
    let currentIndex = 0;
    let currentRound = 1;
    let score = 0;
    let revealsUsed = 0;
    let revealTimer;
    let secondsRemaining = 60;

    async function loadWords() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            masterList = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    word: cols[0]?.replace(/^"|"$/g, '').trim().toUpperCase(), 
                    sentence: cols[1]?.replace(/^"|"$/g, '').trim(),
                    grammar: cols[3]?.replace(/^"|"$/g, '').trim(),
                    category: cols[4]?.replace(/^"|"$/g, '').trim()
                };
            }).filter(item => item.word);
            startDailyQuiz();
        } catch (e) { alert("Data Sync Error"); }
    }

    function startDailyQuiz() {
        const g = masterList.filter(w => w.category === "Grammar Patterns").sort(() => 0.5 - Math.random()).slice(0, 3);
        const h = masterList.filter(w => w.category === "High-Impact").sort(() => 0.5 - Math.random()).slice(0, 3);
        const y = masterList.filter(w => w.category === "Year 5 and 6").sort(() => 0.5 - Math.random()).slice(0, 4);
        sessionWords = [...g, ...h, ...y].sort(() => 0.5 - Math.random());
        document.getElementById("loading-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        setupRound();
    }

    function setupRound() {
        currentIndex = 0;
        revealsUsed = 0;
        document.getElementById("reveal-count").innerText = revealsUsed;
        document.getElementById("round-tag").innerText = currentRound === 1 ? "Round 1: Investigation" : "Round 2: Master Mode";
        document.getElementById("report-screen").style.display = "none";
        document.getElementById("game-ui").style.display = "inline-block";
        showWord();
    }

    function showWord() {
        if (currentIndex >= sessionWords.length) { showReport(); return; }
        let obj = sessionWords[currentIndex];
        document.getElementById("score-display").innerText = score;
        document.getElementById("current-count").innerText = currentIndex + 1;
        document.getElementById("sentence-display").innerText = obj.sentence.replace(new RegExp(obj.word, 'gi'), "_______");
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("message").innerText = "";
        document.getElementById("grammar-box").style.display = "none";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("hint-btn").style.display = "inline-block";
        document.getElementById("reveal-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("scrambled-word").innerText = (currentRound === 1) ? obj.word.split('').sort(() => 0.5 - Math.random()).join(' ') : "";
        
        startRevealTimer();
        document.getElementById("user-input").focus();
    }

    function startRevealTimer() {
        clearInterval(revealTimer);
        secondsRemaining = 60;
        const btn = document.getElementById("reveal-btn");
        const timerText = document.getElementById("timer-text");
        btn.disabled = true;
        btn.classList.remove("active");
        timerText.style.display = "block";
        
        revealTimer = setInterval(() => {
            secondsRemaining--;
            document.getElementById("timer-countdown").innerText = secondsRemaining;
            if (secondsRemaining <= 0) {
                clearInterval(revealTimer);
                btn.disabled = false;
                btn.classList.add("active");
                timerText.style.display = "none";
            }
        }, 1000);
    }

    function showFirstLetter() {
        const firstLetter = sessionWords[currentIndex].word.charAt(0);
        document.getElementById("message").innerText = `Hint: Starts with "${firstLetter}"`;
        document.getElementById("message").style.color = "var(--hint)";
    }

    function revealFullWord() {
        revealsUsed++;
        document.getElementById("reveal-count").innerText = revealsUsed;
        
        if (revealsUsed > 3) {
            alert("Strike 4! Too many reveals used. You must restart the entire quiz.");
            location.reload();
            return;
        }

        const target = sessionWords[currentIndex].word;
        document.getElementById("message").innerText = `The word is: ${target}. Now type it!`;
        document.getElementById("message").style.color = "var(--warning)";
        document.getElementById("reveal-btn").disabled = true;
        document.getElementById("reveal-btn").classList.remove("active");
    }

    function checkWord() {
        let guess = document.getElementById("user-input").value.toUpperCase().trim();
        let target = sessionWords[currentIndex].word;
        if (guess === target) {
            if (currentRound === 2) score++;
            handleSuccess();
        } else {
            document.getElementById("message").style.color = "var(--error)";
            document.getElementById("message").innerText = "❌ Try again!";
        }
    }

    function handleSuccess() {
        clearInterval(revealTimer);
        document.getElementById("user-input").disabled = true;
        document.getElementById("message").style.color = "var(--success)";
        document.getElementById("message").innerText = "✔ Correct!";
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("hint-btn").style.display = "none";
        document.getElementById("reveal-btn").style.display = "none";
        document.getElementById("timer-text").style.display = "none";
        document.getElementById("next-btn").style.display = "block";
        if (sessionWords[currentIndex].grammar) {
            document.getElementById("grammar-box").innerText = sessionWords[currentIndex].grammar;
            document.getElementById("grammar-box").style.display = "block";
        }
    }

    function nextWord() { currentIndex++; showWord(); }

    function showReport() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("report-screen").style.display = "inline-block";
        if (currentRound === 1) {
            document.getElementById("report-title").innerText = "Round 1 Complete!";
            document.getElementById("session-summary").innerText = "Ready for Master Mode?";
            document.getElementById("round-action-btn").innerText = "Start Round 2";
        } else {
            const pct = (score / 10) * 100;
            document.getElementById("report-title").innerText = "Final Results";
            document.getElementById("session-summary").innerText = `Mastery: ${pct}%`;
            document.getElementById("round-action-btn").innerText = (pct >= 90) ? "Claim Reward! 🎁" : "Finish Session";
        }
    }

    function handleRoundTransition() {
        if (currentRound === 1) { currentRound = 2; score = 0; setupRound(); }
        else if ((score / 10) >= 0.9) { 
            document.getElementById("report-screen").style.display = "none";
            document.getElementById("reward-screen").style.display = "inline-block";
        } else { location.reload(); }
    }

    function showCustomInput() {
        document.getElementById("custom-reward-input").style.display = "block";
    }

    function sendRewardEmail(reward) {
        const body = encodeURIComponent(`Hi Mum & Dad! I mastered my spelling list with a score of ${score}/10. I have chosen my reward: ${reward}.`);
        window.location.href = `mailto:${PARENT_EMAILS}?subject=Spelling Reward Claimed!&body=${body}`;
        alert("Notification sent! Great job.");
        location.reload();
    }

    function sendCustomReward() {
        const customReward = document.getElementById("custom-text").value;
        if (!customReward) { alert("Please type your request!"); return; }
        sendRewardEmail(`CUSTOM REQUEST: ${customReward}`);
    }

    document.getElementById("user-input").addEventListener("keyup", (e) => {
        if(e.key === "Enter") {
            if (document.getElementById("check-btn").style.display !== "none") checkWord();
            else if (document.getElementById("next-btn").style.display !== "none") nextWord();
        }
    });

    loadWords();
</script>
</body>
</html>
